# Конфигурация за интеграция на demos като подпапка
# Добавете тези location блокове в конфигурацията на главния ви сайт

# Demos подпапка - proxy към сървър машината
location /demos/ {
    # Премахваме /demos/ от URL-а преди да го изпратим към backend
    rewrite ^/demos/(.*) /$1 break;
    
    proxy_pass http://SERVER_MACHINE_IP:8084;  # Заменете SERVER_MACHINE_IP
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /demos;
    
    # За по-големи файлове
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;
    
    # Timeout настройки
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

# Demo файлове за изтегляне чрез подпапка
location ~ ^/demos/(zescape|csgomod)/ {
    # Премахваме /demos/ от URL-а
    rewrite ^/demos/(.*) /$1 break;
    
    proxy_pass http://SERVER_MACHINE_IP:8084;  # Заменете SERVER_MACHINE_IP
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # За изтегляне на файлове
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;
}