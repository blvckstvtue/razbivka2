server {
    listen 8084;
    server_name _;
    root /home/martink1337/hub/demosite;
    index index.php index.html;
    
    # PHP-FPM настройки
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;  # Променете версията според вашата PHP инсталация
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Добавяме CORS хедъри за API заявки
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
    }
    
    # Главна страница
    location = / {
        try_files /index.php /index.html =404;
    }
    
    # Статични файлове (CSS, JS, изображения)
    location ~ ^/(style|img|js)/ {
        expires 1d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # API endpoint
    location /api.php {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # CORS хедъри за API
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
        
        # Отговор на OPTIONS заявки
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
            return 204;
        }
    }
    
    # Първата директория - zescape
    location /zescape/ {
        alias /home/martink1337/hub/cssource/zescape/cstrike/demos/;
        autoindex off;  # Изключваме autoindex, защото използваме PHP
        gzip off;
        default_type application/octet-stream;
        
        # Позволяваме само изтегляне на .dem файлове
        location ~ \.dem$ {
            add_header Content-Disposition "attachment";
            add_header Content-Type "application/octet-stream";
        }
        
        # Блокираме достъп до други файлове
        location ~ \.(php|html|txt|log)$ {
            deny all;
        }
    }

    # Втората директория - csgomod
    location /csgomod/ {
        alias /home/martink1337/hub/cssource/csgomod/cstrike/demos/;
        autoindex off;  # Изключваме autoindex, защото използваме PHP
        gzip off;
        default_type application/octet-stream;
        
        # Позволяваме само изтегляне на .dem файлове
        location ~ \.dem$ {
            add_header Content-Disposition "attachment";
            add_header Content-Type "application/octet-stream";
        }
        
        # Блокираме достъп до други файлове
        location ~ \.(php|html|txt|log)$ {
            deny all;
        }
    }
    
    # Сигурност - блокираме достъп до чувствителни файлове
    location ~ /\. {
        deny all;
    }
    
    location ~ ~$ {
        deny all;
    }
    
    location ~* \.(bak|backup|old|tmp)$ {
        deny all;
    }
    
    # Лог файлове
    access_log /var/log/nginx/demos_access.log;
    error_log /var/log/nginx/demos_error.log;
}