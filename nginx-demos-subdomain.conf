# Конфигурация за demos поддомейн с SSL
# Поставете този файл на уеб машината в /etc/nginx/sites-available/

# HTTP редирект към HTTPS
server {
    listen 80;
    server_name demos.yourdomain.com;  # Заменете с вашия домейн
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Редирект към HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS сървър с reverse proxy
server {
    listen 443 ssl http2;
    server_name demos.yourdomain.com;  # Заменете с вашия домейн
    
    # SSL настройки
    ssl_certificate /etc/letsencrypt/live/demos.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demos.yourdomain.com/privkey.pem;
    
    # Модерни SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS заглавка
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Сигурностни заглавки
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # Proxy към сървър машината
    location / {
        proxy_pass http://SERVER_MACHINE_IP:8084;  # Заменете SERVER_MACHINE_IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # За по-големи файлове
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        
        # Timeout настройки
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Директен достъп до demo файловете за изтегляне
    location ~ ^/(zescape|csgomod)/ {
        proxy_pass http://SERVER_MACHINE_IP:8084;  # Заменете SERVER_MACHINE_IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # За изтегляне на файлове
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
    }
    
    # Логове
    access_log /var/log/nginx/demos_ssl_access.log;
    error_log /var/log/nginx/demos_ssl_error.log;
}